<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1200"/>
      <stop offset="100%" style="stop-color:#0a0800"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842"/>
      <stop offset="50%" style="stop-color:#d4a017"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#gold)" stroke-width="6" opacity="0.8"/>
  <text x="256" y="348" font-family="Georgia, serif" font-size="290" font-weight="bold"
        text-anchor="middle" fill="url(#gold)" filter="url(#glow)" letter-spacing="-8">M</text>
  <circle cx="256" cy="256" r="220" fill="none" stroke="#f5c842" stroke-width="1" opacity="0.25"/>
</svg>
