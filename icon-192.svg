<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1200"/>
      <stop offset="100%" style="stop-color:#0a0800"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5c842"/>
      <stop offset="50%" style="stop-color:#d4a017"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="96" cy="96" r="96" fill="url(#bg)"/>
  <!-- Gold ring border -->
  <circle cx="96" cy="96" r="88" fill="none" stroke="url(#gold)" stroke-width="3" opacity="0.8"/>
  <!-- M letterform -->
  <text x="96" y="130" font-family="Georgia, serif" font-size="110" font-weight="bold"
        text-anchor="middle" fill="url(#gold)" filter="url(#glow)" letter-spacing="-4">M</text>
  <!-- Subtle inner glow ring -->
  <circle cx="96" cy="96" r="80" fill="none" stroke="#f5c842" stroke-width="0.5" opacity="0.3"/>
</svg>
