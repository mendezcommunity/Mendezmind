<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found</title>
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
  <meta name="referrer" content="no-referrer">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;900&family=Orbitron:wght@600;800;900&display=swap" rel="stylesheet">
  <style>
    /* ── Design tokens ─────────────────────────────────────────────────── */
    :root {
      --bg:        #0a0a0a;
      --surface:   #111108;
      --surface2:  #18160a;
      --gold:      #d4a017;
      --gold-lt:   #f5c842;
      --gold-dk:   #b8860b;
      --red:       #c0392b;
      --red-lt:    #e74c3c;
      --green:     #1a7a4a;
      --green-lt:  #27ae60;
      --muted:     #6b6550;
      --text:      #e8dfc0;
      --text-dim:  #a89870;
      --border:    rgba(212,160,23,0.18);
      --glass:     rgba(26,22,10,0.72);
      --radius:    14px;
      --radius-sm: 8px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Aurora background ─────────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(212,160,23,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 50% 35% at 80% 75%, rgba(184,134,11,0.05) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(245,200,66,0.03) 0%, transparent 70%);
      animation: aurora 18s ease-in-out infinite alternate;
    }
    @keyframes aurora {
      0%   { opacity: 0.7; transform: scale(1)   rotate(0deg); }
      50%  { opacity: 1;   transform: scale(1.04) rotate(1deg); }
      100% { opacity: 0.8; transform: scale(0.98) rotate(-1deg); }
    }

    /* ── Fake 404 page ─────────────────────────────────────────────────── */
    #page-404 {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg);
      text-align: center; padding: 2rem;
    }
    #page-404 .code {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 900;
      color: var(--muted);
      line-height: 1;
      letter-spacing: -4px;
    }
    #page-404 h1 { font-size: 1.4rem; color: var(--muted); margin: 1rem 0 0.5rem; font-weight: 500; }
    #page-404 p  { color: var(--muted); font-size: 0.9rem; opacity: 0.7; }
    #page-404 a  {
      color: var(--gold); text-decoration: none; margin-top: 1.5rem;
      display: inline-block; font-size: 0.85rem; letter-spacing: 0.5px;
      border-bottom: 1px solid rgba(212,160,23,0.3); padding-bottom: 2px;
      transition: color 0.2s;
    }
    #page-404 a:hover { color: var(--gold-lt); }

    /* ── Login screen ──────────────────────────────────────────────────── */
    #page-login {
      position: fixed; inset: 0; z-index: 10;
      display: none; align-items: center; justify-content: center;
      padding: 1.5rem;
    }

    .login-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%; max-width: 420px;
      backdrop-filter: blur(24px);
      box-shadow: 0 8px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(212,160,23,0.08);
      position: relative; overflow: hidden;
      animation: card-in 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: none; }
    }
    /* shimmer sweep */
    .login-card::before {
      content: '';
      position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(245,200,66,0.06), transparent);
      animation: shimmer 3.5s ease-in-out infinite;
    }
    @keyframes shimmer { 0%,100% { left: -100%; } 50% { left: 140%; } }

    .login-logo { text-align: center; margin-bottom: 1.75rem; }
    .login-logo .brand {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem; font-weight: 900;
      background: linear-gradient(135deg, var(--gold-lt), var(--gold), var(--gold-dk));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: 4px;
    }
    .login-logo .sub {
      font-size: 0.65rem; color: var(--muted); letter-spacing: 3px;
      text-transform: uppercase; margin-top: 4px;
    }
    .login-logo .divider {
      width: 48px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 0.75rem auto 0;
    }

    .login-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem; font-weight: 700;
      color: var(--text); text-align: center; margin-bottom: 1.5rem;
    }

    .form-group { margin-bottom: 1rem; }
    .form-group label {
      display: block; font-size: 0.72rem; font-weight: 600;
      color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase;
      margin-bottom: 0.45rem;
    }
    .form-group input {
      width: 100%; padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text); font-size: 0.95rem; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212,160,23,0.12);
    }

    .btn-login {
      width: 100%; padding: 0.85rem;
      background: linear-gradient(135deg, var(--gold-dk), var(--gold), var(--gold-lt));
      color: #0a0800; font-weight: 800; font-size: 0.95rem;
      font-family: 'Inter', sans-serif; letter-spacing: 1px;
      border: none; border-radius: var(--radius-sm); cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 4px 20px rgba(212,160,23,0.35);
      position: relative; overflow: hidden;
    }
    .btn-login:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(212,160,23,0.5);
    }
    .btn-login:active:not(:disabled) { transform: scale(0.98); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

    .login-error {
      color: #e74c3c; font-size: 0.82rem; text-align: center;
      margin-top: 0.75rem; min-height: 1.2em;
    }
    .attempt-counter {
      color: var(--muted); font-size: 0.75rem; text-align: center;
      margin-top: 0.4rem; min-height: 1em;
    }

    /* ── Admin panel wrapper ───────────────────────────────────────────── */
    #page-admin { display: none; position: relative; z-index: 5; min-height: 100vh; }

    /* ── Admin header ──────────────────────────────────────────────────── */
    .admin-header {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 1rem;
      padding: 1.25rem 2rem;
      background: rgba(10,8,0,0.85);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(16px);
      position: sticky; top: 0; z-index: 100;
    }
    .admin-header .brand {
      font-family: 'Orbitron', sans-serif; font-size: 1.1rem; font-weight: 900;
      background: linear-gradient(135deg, var(--gold-lt), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; letter-spacing: 3px;
    }
    .admin-header .sub {
      font-size: 0.6rem; color: var(--muted); letter-spacing: 2.5px;
      text-transform: uppercase; margin-top: 2px;
    }
    .session-info {
      font-size: 0.75rem; color: var(--muted); letter-spacing: 0.5px;
    }
    .btn-logout {
      padding: 0.45rem 1.1rem;
      background: transparent;
      border: 1px solid rgba(212,160,23,0.35);
      border-radius: 50px; color: var(--gold);
      font-size: 0.78rem; font-weight: 600; cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-logout:hover { background: rgba(212,160,23,0.1); border-color: var(--gold); }

    /* ── Main content ──────────────────────────────────────────────────── */
    .admin-main { padding: 2rem; max-width: 1200px; margin: 0 auto; }

    /* ── Config banner ─────────────────────────────────────────────────── */
    .config-banner {
      background: rgba(212,160,23,0.08);
      border: 1px solid rgba(212,160,23,0.25);
      border-radius: var(--radius-sm);
      padding: 0.85rem 1.25rem;
      font-size: 0.82rem; color: var(--gold);
      margin-bottom: 1.5rem; line-height: 1.6;
    }
    .config-banner code {
      background: rgba(212,160,23,0.15); padding: 1px 5px;
      border-radius: 4px; font-size: 0.8rem;
    }

    /* ── Stats row ─────────────────────────────────────────────────────── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem; margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      backdrop-filter: blur(16px);
      text-align: center;
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .stat-card::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.5;
    }
    .stat-card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(212,160,23,0.12); }
    .stat-card .val {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem; font-weight: 800;
      background: linear-gradient(135deg, var(--gold-lt), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .stat-card .lbl {
      font-size: 0.7rem; color: var(--muted); letter-spacing: 1.5px;
      text-transform: uppercase; margin-top: 0.35rem;
    }

    /* ── Tabs ──────────────────────────────────────────────────────────── */
    .tabs {
      display: flex; gap: 0.5rem; flex-wrap: wrap;
      margin-bottom: 1rem;
    }
    .tab-btn {
      padding: 0.55rem 1.25rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 50px; color: var(--muted);
      font-size: 0.82rem; font-weight: 600; cursor: pointer;
      transition: all 0.2s; letter-spacing: 0.5px;
    }
    .tab-btn:hover { border-color: var(--gold); color: var(--gold); }
    .tab-btn.active {
      background: linear-gradient(135deg, var(--gold-dk), var(--gold));
      border-color: transparent; color: #0a0800;
    }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .refresh-btn {
      padding: 0.5rem 1.25rem; margin-bottom: 1rem;
      background: transparent;
      border: 1px solid rgba(212,160,23,0.3);
      border-radius: var(--radius-sm); color: var(--gold);
      font-size: 0.8rem; font-weight: 600; cursor: pointer;
      transition: background 0.2s;
    }
    .refresh-btn:hover { background: rgba(212,160,23,0.08); }

    /* ── Table ─────────────────────────────────────────────────────────── */
    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--glass);
      backdrop-filter: blur(16px);
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    thead tr {
      background: rgba(212,160,23,0.06);
      border-bottom: 1px solid var(--border);
    }
    th {
      padding: 0.85rem 1rem; text-align: left;
      font-size: 0.68rem; font-weight: 700;
      color: var(--gold); letter-spacing: 1.5px; text-transform: uppercase;
      white-space: nowrap;
    }
    td {
      padding: 0.85rem 1rem; color: var(--text-dim);
      border-bottom: 1px solid rgba(212,160,23,0.06);
      vertical-align: middle;
    }
    tbody tr { transition: background 0.15s; }
    tbody tr:hover { background: rgba(212,160,23,0.04); }
    tbody tr:last-child td { border-bottom: none; }
    td code {
      font-size: 0.78rem; color: var(--muted);
      background: rgba(255,255,255,0.04); padding: 2px 6px; border-radius: 4px;
    }

    /* ── Badges ────────────────────────────────────────────────────────── */
    .badge {
      display: inline-block; padding: 3px 10px;
      border-radius: 50px; font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .badge-new      { background: rgba(212,160,23,0.15); color: var(--gold-lt); border: 1px solid rgba(212,160,23,0.3); }
    .badge-regular  { background: rgba(39,174,96,0.12);  color: #6fcf97;        border: 1px solid rgba(39,174,96,0.25); }
    .badge-pending  { background: rgba(212,160,23,0.12); color: var(--gold);    border: 1px solid rgba(212,160,23,0.25); }
    .badge-approved { background: rgba(39,174,96,0.12);  color: #6fcf97;        border: 1px solid rgba(39,174,96,0.25); }
    .badge-rejected { background: rgba(192,57,43,0.12);  color: #e07070;        border: 1px solid rgba(192,57,43,0.25); }

    /* ── Action buttons ────────────────────────────────────────────────── */
    .action-btns { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .btn-approve {
      padding: 0.4rem 0.9rem;
      background: linear-gradient(135deg, var(--gold-dk), var(--gold));
      color: #0a0800; border: none; border-radius: var(--radius-sm);
      font-size: 0.75rem; font-weight: 700; cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 10px rgba(212,160,23,0.25);
    }
    .btn-approve:hover:not(:disabled) {
      transform: translateY(-1px); box-shadow: 0 4px 16px rgba(212,160,23,0.4);
    }
    .btn-approve:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-reject {
      padding: 0.4rem 0.9rem;
      background: rgba(192,57,43,0.15);
      color: #e07070; border: 1px solid rgba(192,57,43,0.35);
      border-radius: var(--radius-sm);
      font-size: 0.75rem; font-weight: 700; cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .btn-reject:hover { background: rgba(192,57,43,0.28); box-shadow: 0 0 12px rgba(192,57,43,0.25); }

    /* ── Empty state ───────────────────────────────────────────────────── */
    .empty-state {
      text-align: center; padding: 3rem 1rem; color: var(--muted);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.4; }

    /* ── Reject modal ──────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.75); backdrop-filter: blur(6px);
      display: none; align-items: center; justify-content: center; padding: 1.5rem;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 18px; padding: 2rem;
      width: 100%; max-width: 440px;
      box-shadow: 0 16px 64px rgba(0,0,0,0.7);
      animation: card-in 0.3s cubic-bezier(0.22,1,0.36,1) both;
    }
    .modal-box h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; color: var(--text); margin-bottom: 0.75rem;
    }
    .modal-box textarea {
      width: 100%; min-height: 90px; padding: 0.75rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      color: var(--text); font-family: 'Inter', sans-serif; font-size: 0.88rem;
      resize: vertical; outline: none; transition: border-color 0.2s;
    }
    .modal-box textarea:focus { border-color: var(--gold); }
    .modal-actions { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1rem; }
    .btn-cancel {
      padding: 0.55rem 1.25rem;
      background: transparent; border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--muted);
      font-size: 0.85rem; cursor: pointer; transition: border-color 0.2s;
    }
    .btn-cancel:hover { border-color: var(--gold); color: var(--gold); }
    .btn-confirm-reject {
      padding: 0.55rem 1.25rem;
      background: linear-gradient(135deg, #8b1a1a, var(--red-lt));
      color: #fff; border: none; border-radius: var(--radius-sm);
      font-size: 0.85rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 2px 12px rgba(192,57,43,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-confirm-reject:hover:not(:disabled) {
      transform: translateY(-1px); box-shadow: 0 4px 20px rgba(192,57,43,0.45);
    }
    .btn-confirm-reject:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Toast ─────────────────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 9999;
      padding: 0.85rem 1.5rem; border-radius: var(--radius-sm);
      font-size: 0.88rem; font-weight: 600; max-width: 340px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      animation: toast-in 0.3s ease both;
    }
    @keyframes toast-in { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:none; } }
    .toast-success { background: rgba(26,122,74,0.95); color: #a8f0c6; border: 1px solid rgba(39,174,96,0.4); }
    .toast-error   { background: rgba(120,30,20,0.95); color: #f0a8a8; border: 1px solid rgba(192,57,43,0.4); }
    .toast-info    { background: rgba(26,22,10,0.95);  color: var(--gold); border: 1px solid var(--border); }

    /* ── Responsive ────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .admin-header { padding: 1rem; }
      .admin-main   { padding: 1rem; }
      .stats-row    { grid-template-columns: repeat(2, 1fr); }
      th, td        { padding: 0.65rem 0.75rem; }
    }
  </style>
</head>
<body>

<!-- LAYER 1: Fake 404 (shown without #auth hash) -->
<div id="page-404">
  <div class="code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you are looking for doesn't exist or has been moved.</p>
  <a href="index.html">← Back to Home</a>
</div>

<!-- LAYER 2: Login screen (shown only with #auth hash) -->
<div id="page-login">
  <div class="login-card">
    <div class="login-logo">
      <div class="brand">MENDEZ</div>
      <div class="sub">Community &middot; Admin Portal</div>
      <div class="divider"></div>
    </div>
    <h2>Secure Sign In</h2>
    <div class="form-group">
      <label>Admin Secret</label>
      <input type="password" id="secret-input" placeholder="Enter your ADMIN_SECRET"
             autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <button class="btn-login" id="btn-sign-in">Sign In →</button>
    <div class="login-error" id="login-error"></div>
    <div class="attempt-counter" id="attempt-counter"></div>
  </div>
</div>

<!-- LAYER 3: Admin panel (injected after auth) -->
<div id="page-admin"></div>

<!-- Reject modal -->
<div class="modal-overlay" id="reject-modal">
  <div class="modal-box">
    <h3>Reject Withdrawal</h3>
    <p style="color:var(--muted);font-size:0.85rem;margin-bottom:0.75rem;">
      User points will be refunded automatically. Provide a reason (optional):
    </p>
    <textarea id="reject-reason" placeholder="e.g. Insufficient verified activity, duplicate request"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-confirm-reject" id="modal-confirm">Confirm Reject</button>
    </div>
  </div>
</div>

<script>
// ─── GITHUB PAGES FALLBACK VERSION ──────────────────────────────────────────
// This admin.html is the GitHub Pages fallback with client-side hardening.
// For true server-side security, deploy firebase/ to Firebase Hosting.
// Firebase Hosting access: https://YOUR-PROJECT.web.app/admin
// GitHub Pages access:     https://mendezcommunity.github.io/Mendezmind/admin.html#auth
// ────────────────────────────────────────────────────────────────────────────

/* ================================================================
   SECURITY: Hash Gate + Rate Limiting + Session Timeout
   ================================================================ */

// ── CONFIG PLACEHOLDERS ──────────────────────────────────────────────────────
// After `firebase deploy --only functions`, replace YOUR-PROJECT with
// your real Firebase project ID. Format:
// https://us-central1-YOUR-PROJECT-ID.cloudfunctions.net/FUNCTION_NAME
const ADMIN_CONFIG = {
  LIST_ENDPOINT:    "https://us-central1-YOUR-PROJECT.cloudfunctions.net/adminListWithdrawals",
  APPROVE_ENDPOINT: "https://us-central1-YOUR-PROJECT.cloudfunctions.net/adminApproveWithdrawal",
  REJECT_ENDPOINT:  "https://us-central1-YOUR-PROJECT.cloudfunctions.net/adminRejectWithdrawal",
};
// ── END CONFIG ───────────────────────────────────────────────────────────────

const RATE_LIMIT_KEY  = "mz_admin_lockout";
const ATTEMPTS_KEY    = "mz_admin_attempts";
const SESSION_KEY     = "mz_admin_session";
const SESSION_MS      = 30 * 60 * 1000;  // 30 minutes
const MAX_ATTEMPTS    = 5;
const LOCKOUT_MS      = 15 * 60 * 1000;  // 15 minutes

let sessionTimer = null;
let currentSecret = "";
let rejectTargetId = null;

/* ── Hash Gate ──────────────────────────────────────────────────────────── */
function checkHashGate() {
  const hash = window.location.hash;
  const params = new URLSearchParams(window.location.search);
  const ok = hash === "#auth" || hash === "#admin" || params.get("access") === "1";
  document.getElementById("page-404").style.display = ok ? "none" : "flex";
  document.getElementById("page-login").style.display = ok ? "flex" : "none";
  document.title = ok ? "Admin Portal" : "404 Not Found";
  return ok;
}
window.addEventListener("hashchange", () => { if (checkHashGate()) checkExistingSession(); });

/* ── Rate Limiting ──────────────────────────────────────────────────────── */
function getLockout() {
  try {
    const d = JSON.parse(sessionStorage.getItem(RATE_LIMIT_KEY) || "null");
    if (d && Date.now() < d.until) return d;
    sessionStorage.removeItem(RATE_LIMIT_KEY);
  } catch(e) {}
  return null;
}
function getAttempts() { return parseInt(sessionStorage.getItem(ATTEMPTS_KEY) || "0", 10); }
function recordFail() {
  const a = getAttempts() + 1;
  sessionStorage.setItem(ATTEMPTS_KEY, a);
  if (a >= MAX_ATTEMPTS) {
    sessionStorage.setItem(RATE_LIMIT_KEY, JSON.stringify({ until: Date.now() + LOCKOUT_MS }));
    sessionStorage.removeItem(ATTEMPTS_KEY);
    return { locked: true };
  }
  return { locked: false, remaining: MAX_ATTEMPTS - a };
}
function clearAttempts() {
  sessionStorage.removeItem(ATTEMPTS_KEY);
  sessionStorage.removeItem(RATE_LIMIT_KEY);
}
function updateLockoutUI() {
  const lockout = getLockout();
  const btn = document.getElementById("btn-sign-in");
  const counter = document.getElementById("attempt-counter");
  if (lockout) {
    const mins = Math.ceil((lockout.until - Date.now()) / 60000);
    btn.disabled = true;
    counter.textContent = "Too many failed attempts. Try again in " + mins + " minute(s).";
    setTimeout(updateLockoutUI, 30000);
  } else {
    btn.disabled = false;
    const a = getAttempts();
    counter.textContent = a > 0 ? a + "/" + MAX_ATTEMPTS + " failed attempts" : "";
  }
}

/* ── Session Management ─────────────────────────────────────────────────── */
function saveSession(secret) { sessionStorage.setItem(SESSION_KEY, JSON.stringify({ secret, at: Date.now() })); }
function getSession() {
  try {
    const s = JSON.parse(sessionStorage.getItem(SESSION_KEY) || "null");
    if (s && Date.now() - s.at < SESSION_MS) return s;
    sessionStorage.removeItem(SESSION_KEY);
  } catch(e) {}
  return null;
}
function startSessionTimer() {
  clearTimeout(sessionTimer);
  sessionTimer = setTimeout(() => {
    showToast("Session expired. Please sign in again.", "info");
    setTimeout(logout, 1500);
  }, SESSION_MS);
}
function resetSessionTimer() {
  const s = getSession();
  if (s) { saveSession(s.secret); startSessionTimer(); }
}
function logout() {
  sessionStorage.removeItem(SESSION_KEY);
  currentSecret = "";
  clearTimeout(sessionTimer);
  document.getElementById("page-admin").style.display = "none";
  document.getElementById("page-admin").innerHTML = "";
  document.getElementById("page-login").style.display = "flex";
  document.getElementById("secret-input").value = "";
  document.getElementById("login-error").textContent = "";
  document.title = "Admin Portal";
}
function checkExistingSession() {
  const s = getSession();
  if (s) { currentSecret = s.secret; unlockPanel(s.secret); }
  else updateLockoutUI();
}

/* ── Login Handler ──────────────────────────────────────────────────────── */
async function handleLogin() {
  if (getLockout()) { updateLockoutUI(); return; }
  const secret = document.getElementById("secret-input").value.trim();
  if (!secret) { document.getElementById("login-error").textContent = "Please enter your Admin Secret."; return; }
  const btn = document.getElementById("btn-sign-in");
  btn.disabled = true; btn.textContent = "Verifying...";

  const configured = !ADMIN_CONFIG.LIST_ENDPOINT.includes("YOUR-PROJECT");
  let ok = false;
  if (configured) {
    try {
      const r = await fetch(ADMIN_CONFIG.LIST_ENDPOINT + "?status=pending&limit=1", { headers: { "x-admin-secret": secret } });
      ok = r.ok;
    } catch(e) { ok = true; } // network error -> allow demo
  } else {
    ok = secret.length >= 4; // demo mode: any 4+ char secret
  }

  if (ok) {
    clearAttempts();
    saveSession(secret);
    currentSecret = secret;
    unlockPanel(secret);
  } else {
    const res = recordFail();
    document.getElementById("login-error").textContent = res.locked
      ? "Too many failed attempts. Locked for 15 minutes."
      : "Incorrect secret. " + res.remaining + " attempt(s) remaining.";
    updateLockoutUI();
    btn.disabled = false; btn.textContent = "Sign In →";
  }
}

/* ── Unlock Panel ───────────────────────────────────────────────────────── */
function unlockPanel(secret) {
  document.getElementById("page-login").style.display = "none";
  document.title = "Mendez Admin — Withdrawal Panel";
  const configured = !ADMIN_CONFIG.LIST_ENDPOINT.includes("YOUR-PROJECT");
  const banner = configured ? "" : `<div class="config-banner">
    ⚠️ Demo Mode: Cloud Function URLs not configured. Replace <code>YOUR-PROJECT</code> in ADMIN_CONFIG with your real Firebase project ID. Showing sample data.
  </div>`;

  document.getElementById("page-admin").style.display = "block";
  document.getElementById("page-admin").innerHTML = `
  <div class="admin-header">
    <div>
      <div class="brand">MENDEZ</div>
      <div class="sub">Admin &middot; Withdrawal Panel</div>
    </div>
    <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
      <span class="session-info" id="session-timer">Session: 30m remaining</span>
      <button class="btn-logout" id="btn-logout-top">Sign Out</button>
    </div>
  </div>
  <div class="admin-main">
    ${banner}
    <div class="stats-row">
      <div class="stat-card"><div class="val" id="stat-pending">-</div><div class="lbl">Pending</div></div>
      <div class="stat-card"><div class="val" id="stat-approved">-</div><div class="lbl">Approved Today</div></div>
      <div class="stat-card"><div class="val" id="stat-rejected">-</div><div class="lbl">Rejected Today</div></div>
      <div class="stat-card"><div class="val" id="stat-total">-</div><div class="lbl">Total Requests</div></div>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="pending">⏳ Pending</button>
      <button class="tab-btn" data-tab="approved">✅ Approved</button>
      <button class="tab-btn" data-tab="rejected">❌ Rejected</button>
      <button class="tab-btn" data-tab="all">📋 All</button>
    </div>
    <button class="refresh-btn" id="btn-refresh">↻ Refresh</button>
    <div id="tab-pending" class="tab-content active">
      <div class="table-wrap"><table>
        <thead><tr><th>User ID</th><th>PayPal Email</th><th>Amount</th><th>Tier</th><th>Cycle</th><th>Requested</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="tbody-pending"><tr><td colspan="8"><div class="empty-state"><div class="icon">⏳</div>Loading…</div></td></tr></tbody>
      </table></div>
    </div>
    <div id="tab-approved" class="tab-content">
      <div class="table-wrap"><table>
        <thead><tr><th>User ID</th><th>PayPal Email</th><th>Amount</th><th>Tier</th><th>Requested</th><th>Approved At</th><th>Status</th></tr></thead>
        <tbody id="tbody-approved"><tr><td colspan="7"><div class="empty-state"><div class="icon">✅</div>Loading…</div></td></tr></tbody>
      </table></div>
    </div>
    <div id="tab-rejected" class="tab-content">
      <div class="table-wrap"><table>
        <thead><tr><th>User ID</th><th>PayPal Email</th><th>Amount</th><th>Tier</th><th>Requested</th><th>Rejected At</th><th>Reason</th></tr></thead>
        <tbody id="tbody-rejected"><tr><td colspan="7"><div class="empty-state"><div class="icon">❌</div>Loading…</div></td></tr></tbody>
      </table></div>
    </div>
    <div id="tab-all" class="tab-content">
      <div class="table-wrap"><table>
        <thead><tr><th>User ID</th><th>PayPal Email</th><th>Amount</th><th>Tier</th><th>Requested</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="tbody-all"><tr><td colspan="7"><div class="empty-state"><div class="icon">📋</div>Loading…</div></td></tr></tbody>
      </table></div>
    </div>
    <p style="color:var(--muted);font-size:0.72rem;margin-top:2.5rem;text-align:center;letter-spacing:0.5px;">
      Withdrawal Requests Panel &middot; Mendez Community &middot; Payouts from real ad revenue only &middot; Not a guaranteed salary
    </p>
  </div>`;

  document.getElementById("btn-logout-top").addEventListener("click", logout);
  document.querySelectorAll(".tab-btn").forEach(b => b.addEventListener("click", () => switchTab(b.dataset.tab)));
  document.getElementById("btn-refresh").addEventListener("click", () => loadWithdrawals("pending"));
  document.getElementById("modal-cancel").addEventListener("click", closeRejectModal);
  document.getElementById("modal-confirm").addEventListener("click", confirmReject);

  ["click","keydown","mousemove","touchstart"].forEach(ev =>
    document.addEventListener(ev, resetSessionTimer, { passive: true })
  );
  startSessionTimer();
  setInterval(updateSessionDisplay, 60000);
  updateSessionDisplay();
  loadWithdrawals("pending");
}

function updateSessionDisplay() {
  const s = getSession();
  const el = document.getElementById("session-timer");
  if (!el || !s) return;
  const mins = Math.ceil((SESSION_MS - (Date.now() - s.at)) / 60000);
  el.textContent = "Session: " + mins + "m remaining";
}

/* ── Tab switching ──────────────────────────────────────────────────────── */
function switchTab(tab) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b.dataset.tab === tab));
  document.querySelectorAll(".tab-content").forEach(c => c.classList.toggle("active", c.id === "tab-" + tab));
  loadWithdrawals(tab);
}

/* ── Load withdrawals ───────────────────────────────────────────────────── */
async function loadWithdrawals(status) {
  const configured = !ADMIN_CONFIG.LIST_ENDPOINT.includes("YOUR-PROJECT");
  if (!configured) { renderDemoData(status); return; }
  try {
    const r = await fetch(ADMIN_CONFIG.LIST_ENDPOINT + "?status=" + status, { headers: { "x-admin-secret": currentSecret } });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    renderData(data.requests || [], status);
    updateStats(data.stats || {});
  } catch(e) {
    showToast("Failed to load: " + e.message, "error");
    renderEmpty(status, "Failed to load. Check Cloud Function URL and ADMIN_SECRET.");
  }
}

/* ── Render helpers ─────────────────────────────────────────────────────── */
function fmtDate(ts) {
  if (!ts) return "-";
  try { return new Date(ts._seconds ? ts._seconds * 1000 : ts).toLocaleString(); } catch(e) { return "-"; }
}
function tierBadge(t) { return t === "new" ? '<span class="badge badge-new">New</span>' : '<span class="badge badge-regular">Regular</span>'; }
function statusBadge(s) {
  const m = { pending: "badge-pending", approved: "badge-approved", approved_manual: "badge-approved", rejected: "badge-rejected" };
  return '<span class="badge ' + (m[s] || "badge-pending") + '">' + (s || "pending") + "</span>";
}
function renderData(reqs, status) {
  const id = "tbody-" + (status === "all" ? "all" : status);
  const tb = document.getElementById(id);
  if (!tb) return;
  if (!reqs.length) { renderEmpty(status, "No requests found."); return; }
  tb.innerHTML = reqs.map(req => {
    const isPending = req.status === "pending";
    const acts = isPending
      ? '<div class="action-btns"><button class="btn-approve" onclick="approveRequest(\'' + req.id + '\',this)">✅ Approve</button><button class="btn-reject" onclick="openRejectModal(\'' + req.id + '\')">❌ Reject</button></div>'
      : "-";
    if (status === "approved") return "<tr><td><code>" + (req.userId||"").slice(0,12) + "…</code></td><td>" + (req.paypalEmail||"-") + "</td><td>$" + (req.amountUSD||0).toFixed(2) + "</td><td>" + tierBadge(req.tier) + "</td><td>" + fmtDate(req.requestedAt) + "</td><td>" + fmtDate(req.approvedAt) + "</td><td>" + statusBadge(req.status) + "</td></tr>";
    if (status === "rejected") return "<tr><td><code>" + (req.userId||"").slice(0,12) + "…</code></td><td>" + (req.paypalEmail||"-") + "</td><td>$" + (req.amountUSD||0).toFixed(2) + "</td><td>" + tierBadge(req.tier) + "</td><td>" + fmtDate(req.requestedAt) + "</td><td>" + fmtDate(req.rejectedAt) + "</td><td>" + (req.rejectReason||"-") + "</td></tr>";
    return "<tr><td><code>" + (req.userId||"").slice(0,12) + "…</code></td><td>" + (req.paypalEmail||"-") + "</td><td>$" + (req.amountUSD||0).toFixed(2) + "</td><td>" + tierBadge(req.tier) + "</td><td>" + (req.salaryCycle ? req.salaryCycle + "-day" : "-") + "</td><td>" + fmtDate(req.requestedAt) + "</td><td>" + statusBadge(req.status) + "</td><td>" + acts + "</td></tr>";
  }).join("");
}
function renderEmpty(status, msg) {
  const id = "tbody-" + (status === "all" ? "all" : status);
  const tb = document.getElementById(id);
  if (tb) tb.innerHTML = '<tr><td colspan="8"><div class="empty-state"><div class="icon">—</div>' + msg + "</div></td></tr>";
}
function updateStats(s) {
  const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v ?? "-"; };
  set("stat-pending", s.pending); set("stat-approved", s.approvedToday);
  set("stat-rejected", s.rejectedToday); set("stat-total", s.total);
}

/* ── Demo data ──────────────────────────────────────────────────────────── */
function renderDemoData(status) {
  const now = Date.now();
  const demo = [
    { id: "req_demo1", userId: "user_abc123demo", paypalEmail: "user1@example.com", amountUSD: 2.50, tier: "new",     salaryCycle: null, requestedAt: { _seconds: (now-3600000)/1000 },   status: "pending" },
    { id: "req_demo2", userId: "user_xyz789demo", paypalEmail: "user2@example.com", amountUSD: 5.00, tier: "regular", salaryCycle: 15,   requestedAt: { _seconds: (now-7200000)/1000 },   status: "pending" },
  ];
  const approved = [{ id: "req_demo3", userId: "user_old001demo", paypalEmail: "old1@example.com", amountUSD: 3.00, tier: "regular", requestedAt: { _seconds: (now-86400000)/1000 }, approvedAt: { _seconds: (now-3600000)/1000 }, status: "approved" }];
  const rejected = [{ id: "req_demo4", userId: "user_old002demo", paypalEmail: "old2@example.com", amountUSD: 1.00, tier: "new",     requestedAt: { _seconds: (now-172800000)/1000 }, rejectedAt: { _seconds: (now-86400000)/1000 }, rejectReason: "Insufficient verified activity", status: "rejected" }];
  const map = { pending: demo, approved, rejected, all: [...demo, ...approved, ...rejected] };
  renderData(map[status] || demo, status);
  updateStats({ pending: 2, approvedToday: 1, rejectedToday: 1, total: 4 });
}

/* ── Approve ────────────────────────────────────────────────────────────── */
async function approveRequest(reqId, btn) {
  if (!confirm("Approve this withdrawal? This will trigger PayPal payout if configured.")) return;
  btn.disabled = true; btn.textContent = "Processing…";
  const configured = !ADMIN_CONFIG.APPROVE_ENDPOINT.includes("YOUR-PROJECT");
  if (!configured) { showToast("Demo mode: approval simulated.", "info"); btn.textContent = "✅ Approved"; return; }
  try {
    const r = await fetch(ADMIN_CONFIG.APPROVE_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-admin-secret": currentSecret },
      body: JSON.stringify({ withdrawalRequestId: reqId })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || "HTTP " + r.status);
    showToast("Approved! " + (data.paypalBatchId ? "PayPal batch: " + data.paypalBatchId : "Marked approved_manual."), "success");
    setTimeout(() => loadWithdrawals("pending"), 1000);
  } catch(e) {
    showToast("Approval failed: " + e.message, "error");
    btn.disabled = false; btn.textContent = "✅ Approve";
  }
}

/* ── Reject modal ───────────────────────────────────────────────────────── */
function openRejectModal(reqId) {
  rejectTargetId = reqId;
  document.getElementById("reject-reason").value = "";
  document.getElementById("reject-modal").classList.add("open");
}
function closeRejectModal() {
  rejectTargetId = null;
  document.getElementById("reject-modal").classList.remove("open");
}
async function confirmReject() {
  if (!rejectTargetId) return;
  const reason = document.getElementById("reject-reason").value.trim();
  const btn = document.getElementById("modal-confirm");
  btn.disabled = true; btn.textContent = "Rejecting…";
  const configured = !ADMIN_CONFIG.REJECT_ENDPOINT.includes("YOUR-PROJECT");
  if (!configured) { showToast("Demo mode: rejection simulated.", "info"); closeRejectModal(); btn.disabled = false; btn.textContent = "Confirm Reject"; return; }
  try {
    const r = await fetch(ADMIN_CONFIG.REJECT_ENDPOINT, {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-admin-secret": currentSecret },
      body: JSON.stringify({ withdrawalRequestId: rejectTargetId, rejectReason: reason })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || "HTTP " + r.status);
    showToast("Rejected. User points refunded.", "success");
    closeRejectModal();
    setTimeout(() => loadWithdrawals("pending"), 1000);
  } catch(e) { showToast("Rejection failed: " + e.message, "error"); }
  btn.disabled = false; btn.textContent = "Confirm Reject";
}

/* ── Toast ──────────────────────────────────────────────────────────────── */
function showToast(msg, type) {
  const t = document.createElement("div");
  t.className = "toast toast-" + (type || "info");
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 4000);
}

/* ── Wire login ─────────────────────────────────────────────────────────── */
document.getElementById("btn-sign-in").addEventListener("click", handleLogin);
document.getElementById("secret-input").addEventListener("keydown", e => { if (e.key === "Enter") handleLogin(); });

/* ── Boot ───────────────────────────────────────────────────────────────── */
if (checkHashGate()) checkExistingSession();
</script>
